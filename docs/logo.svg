  <!-- Main P: each pixel is a 3D block using stacked rects (light top-face, main face, dark bottom-face) -->
  <!-- All highlights/shadows are INSIDE the 12x12 cell, no overflow -->

  <!-- Row 1: ████ -->
  <rect x="72" y="44" width="48" height="2" fill="#6ee7b7" opacity="0.5"/>
  <rect x="72" y="46" width="48" height="8" fill="#34d399"/>
  <rect x="72" y="54" width="48" height="2" fill="#059669" opacity="0.6"/>

  <!-- Row 2 left: █ -->
