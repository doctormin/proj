name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # Natural zsh version coverage via OS defaults:
        #   ubuntu-22.04 → zsh 5.8.1 (apt default)
        #   ubuntu-24.04 → zsh 5.9   (apt default)
        #   macos-latest → zsh 5.9   (brew default, plus the Apple /bin/zsh)
        include:
          - os: ubuntu-22.04
          - os: ubuntu-24.04
          - os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh fzf jq shellcheck

      - name: Install dependencies (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install zsh fzf jq shellcheck
          # macOS ships with zsh but brew's is newer; both are fine

      - name: Install bats-core (pinned)
        run: |
          # Pin to the same version we develop against locally (1.13.0).
          # Vendored bats-support and bats-assert are already in test/lib/.
          git clone --depth 1 --branch v1.13.0 \
            https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local

      - name: Show tool versions
        run: |
          zsh --version
          bats --version
          fzf --version
          jq --version
          shellcheck --version | head -2
          git --version

      - name: zsh syntax check (proj.zsh)
        run: zsh -n proj.zsh

      - name: shellcheck (bash files)
        run: |
          shellcheck -S warning \
            preview.sh \
            install.sh \
            uninstall.sh \
            test/run.sh \
            test/test_helper.bash \
            test/fixtures/bin/claude \
            test/fixtures/bin/fzf

      - name: Run bats test suite
        run: ./test/run.sh

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.os }}
          path: |
            test/**/*.log
            /tmp/proj-test.*
          retention-days: 7
          if-no-files-found: ignore
